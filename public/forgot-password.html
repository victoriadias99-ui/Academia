<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Academia Aprende Excel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f4f5f7;
        }
        .bg-verde-navbar { background-color: #1a5c4a; }
        .text-verde-brillante { color: #00a86b; }
        .bg-verde-boton { background-color: #1a7a5e; }
        .bg-verde-boton:hover { background-color: #00a86b; }
        .text-azul-marino { color: #0d2137; }
        
        .sidebar {
            width: 300px;
            background-color: #1a5c4a;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 40px;
            color: white;
        }
        
        .main-content {
            margin-left: 300px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
            }
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #00a86b;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-primary.loading .loading-spinner {
            display: block;
        }
        .btn-primary.loading .btn-text {
            display: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="flex items-center gap-2 text-2xl font-bold mb-8">
            <span>📊</span>
            <span>Aprende <span class="text-verde-brillante">Excel</span></span>
        </div>
        <p class="text-white/60 text-lg leading-relaxed">
            Recuperá tu acceso
        </p>
    </div>

    <div class="main-content">
        <!-- Estado Inicial -->
        <div id="initial-state" class="form-container">
            <div class="text-5xl mb-6">🔐</div>
            <h1 class="text-2xl font-bold text-azul-marino mb-2">¿Olvidaste tu contraseña?</h1>
            <p class="text-gray-500 mb-8">Ingresá tu email y te enviamos un link para restablecerla</p>
            
            <form id="reset-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                    <p id="error-message" class="text-red-500 text-sm mt-2 hidden"></p>
                </div>
                
                <button type="submit" id="submit-btn" class="btn-primary bg-verde-boton mb-6">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">Enviar link de recuperación</span>
                </button>
            </form>

            <a href="/" class="text-verde-brillante font-medium hover:underline">
                ← Volver al login
            </a>
        </div>

        <!-- Estado Éxito -->
        <div id="success-state" class="form-container hidden">
            <div class="text-6xl mb-6">✅</div>
            <h1 class="text-2xl font-bold text-azul-marino mb-4">¡Listo! Revisá tu email</h1>
            <p class="text-gray-600 mb-8 leading-relaxed">
                Si el email existe en nuestro sistema, recibirás el link en minutos. Revisá también spam.
            </p>
            
            <a href="/" class="btn-primary bg-verde-boton no-underline">
                Volver al login
            </a>
        </div>
    </div>

    <script>
        const form = document.getElementById('reset-form');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');
        const initialState = document.getElementById('initial-state');
        const successState = document.getElementById('success-state');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value;
            
            // Reset states
            errorMessage.classList.add('hidden');
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    initialState.classList.add('hidden');
                    successState.classList.remove('hidden');
                } else {
                    errorMessage.textContent = data.error || 'Ocurrió un error inesperado';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                errorMessage.textContent = 'Error de conexión. Intentá de nuevo.';
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
